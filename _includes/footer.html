<footer class="site-footer">
  <div class="container">
    <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}. All rights reserved.</p>
  </div>
</footer>
<script>
// Mobile menu toggle
document.addEventListener('DOMContentLoaded', function() {
  var toggle = document.querySelector('.menu-toggle');
  var nav = document.getElementById('site-nav');
  if (toggle && nav) {
    toggle.addEventListener('click', function() {
      var expanded = this.getAttribute('aria-expanded') === 'true';
      this.setAttribute('aria-expanded', !expanded);
      nav.classList.toggle('is-open');
    });
  }
  // Abstract toggle text
  var allDetails = document.querySelectorAll('details');
  allDetails.forEach(function(det) {
    var sum = det.querySelector('summary');
    if (sum && sum.textContent.indexOf('Abstract') !== -1) {
      det.addEventListener('toggle', function() {
        if (det.open) {
          sum.textContent = 'Abstract (click to collapse)';
        } else {
          sum.textContent = 'Abstract (click to expand)';
        }
      });
    }
  });
});
</script>
