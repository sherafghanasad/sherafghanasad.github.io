# Site settings
title: Sher Afghan Asad
description: Applied Microeconomist | Fulbright Scholar
url: "https://sherafghanasad.com"
baseurl: ""

# Substack newsletter
# IMPORTANT: replace the value below with your publication's subdomain.
# Find it in Substack under Settings > Publication details, or in the
# address bar when viewing your own publication homepage. No trailing slash.
substack_url: "https://sherafghanasad.substack.com"
substack_profile: "https://substack.com/@sherafghanasad"

# Build settings
markdown: kramdown
permalink: /:title/

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor

# Collections (for future blog/business use)
collections:
  posts:
    output: true
    permalink: /blog/:title/

# Default front matter
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Plugins (GitHub Pages compatible)
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from
