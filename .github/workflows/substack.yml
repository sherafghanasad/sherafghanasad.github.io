name: Sync Substack posts

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:         # allow manual runs from the Actions tab

permissions:
  contents: write
  actions: write

concurrency:
  group: substack-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Fetch latest Substack posts
        env:
          SUBSTACK_FEED: https://sherafghanasad.substack.com/feed
          SUBSTACK_MAX: "5"
        run: python scripts/fetch_substack.py

      - name: Commit if changed
        id: commit
        run: |
          if [ -n "$(git status --porcelain _data/substack.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add _data/substack.json
            git commit -m "chore: sync latest Substack posts"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # A push made with GITHUB_TOKEN doesn't auto-trigger the deploy workflow,
      # so dispatch it explicitly when the data actually changed.
      - name: Trigger site deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run jekyll.yml --ref main
